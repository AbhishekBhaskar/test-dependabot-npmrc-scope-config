version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 12
    registries:
      - jfrog-artifactroy

registries:
  jfrog-artifactroy:
    type: "npm-registry"
    url: "https://jfrogghdemo.jfrog.io/artifactory/api/npm/dpndbt-pvt-repo-npm-key/"
    token: "${{secrets.JFROG_ARTIFACTORY_TOKEN}}"
    replaces-base: true
    scope: "@mycompany"
